name: Deploy to Netlify

# Deploy cadence is BATCHED WEEKLY to control Netlify credit usage. Each production
# deploy costs ~15 Netlify credits (the Next.js runtime is re-bundled every deploy),
# so we accumulate changes on `main` and ship them once a week.
#
#   - push to main      -> build only (free CI safety check, NO deploy)
#   - Wednesday 14:00 UTC (cron) -> build + deploy the current main
#   - workflow_dispatch -> build + deploy on demand (for urgent hotfixes)
on:
  push:
    branches:
      - main
  schedule:
    # Wednesdays at 14:00 UTC (~09:00 ET / 06:00 PT)
    - cron: '0 14 * * 3'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXT_PUBLIC_POSTHOG_DASHBOARD_URL: ${{ secrets.NEXT_PUBLIC_POSTHOG_DASHBOARD_URL }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          NEXT_PUBLIC_GOOGLE_VERIFICATION: ${{ secrets.NEXT_PUBLIC_GOOGLE_VERIFICATION }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
          SANITY_DEPLOYMENT_APP_ID: ${{ secrets.SANITY_DEPLOYMENT_APP_ID }}
          SANITY_STUDIO_NEWSLETTER_API_KEY: ${{ secrets.SANITY_STUDIO_NEWSLETTER_API_KEY }}
          SANITY_STUDIO_SITE_URL: ${{ secrets.SANITY_STUDIO_SITE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RATE_LIMIT_SALT: ${{ secrets.RATE_LIMIT_SALT }}

      # Only the weekly cron and manual runs deploy to Netlify (spends credits).
      # Pushes to main stop at the build step above as a free safety check.
      - name: Deploy to Netlify
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npx netlify-cli deploy --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
